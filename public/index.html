<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f8f6f1">
    <title>Wedding Photo Booth</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="booth" aria-label="Wedding photo booth">
        <header class="topbar">
          <div>
            <p class="eyebrow">Wedding Photo Booth</p>
            <h1 id="appTitle">Make a 4x6 keepsake</h1>
          </div>
          <span class="status-pill" id="connectionStatus">Ready</span>
        </header>

        <section class="capture-view" id="captureView">
          <div class="preview-area">
            <div class="print-frame" id="cropStage" aria-label="4x6 print crop area">
              <img id="cropImage" alt="">
              <video id="cameraVideo" autoplay playsinline muted></video>
              <canvas id="previewCanvas" width="1800" height="1200"></canvas>
              <div class="empty-state" id="emptyState">
                <strong>4x6 print frame</strong>
                <span>3:2 crop · 1800 x 1200 px</span>
              </div>
              <div class="frame-lines" aria-hidden="true"></div>
            </div>
            <div class="print-specs" aria-label="Print specifications">
              <span>4x6 print</span>
              <span>3:2 crop</span>
              <span>1800 x 1200 px</span>
            </div>
          </div>

          <div class="controls-panel">
            <div class="control-grid">
              <label class="field">
                <span>Name</span>
                <input id="guestName" maxlength="80" autocomplete="name" placeholder="Optional">
              </label>

              <div class="field">
                <span>Print style</span>
                <div class="segmented" role="radiogroup" aria-label="Print style">
                  <button class="segment active" type="button" data-layout="single_4x6" aria-pressed="true">4x6</button>
                  <button class="segment" type="button" data-layout="strip" aria-pressed="false">Strip</button>
                </div>
              </div>
            </div>

            <div class="strip-tray" id="stripTray" hidden></div>

            <label class="sr-only" for="photoInput">Choose photo</label>
            <input id="photoInput" class="native-input" type="file" accept="image/*" capture="environment">

            <div class="crop-tools" id="cropTools" hidden>
              <label class="zoom-control" for="zoomRange">
                <span>Zoom</span>
                <input id="zoomRange" type="range" min="1" max="3" step="0.01" value="1">
              </label>
            </div>

            <div class="actions">
              <button class="primary" id="choosePhotoButton" type="button">Use Phone Camera</button>
              <button class="secondary" id="fallbackCameraButton" type="button" hidden>In-App Camera</button>
              <button class="secondary" id="retakeButton" type="button" hidden>Retake</button>
              <button class="primary" id="acceptButton" type="button" hidden>Use This Crop</button>
              <button class="primary" id="submitButton" type="button" hidden>Print This</button>
            </div>
          </div>
        </section>

        <section class="done-panel" id="doneView" hidden>
          <div class="confirmation">
            <div class="print-status" role="status" aria-live="polite">
              <h2 id="doneTitle">Sending your photo.</h2>
              <p id="doneStatus">Creating your print job.</p>
            </div>
            <img id="doneImage" alt="Submitted print preview">
            <button class="primary" id="newPhotoButton" type="button">Take Another</button>
          </div>
        </section>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
